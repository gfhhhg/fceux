name: Build FCEUX Windows EXE

on:
  push:
    branches: [ master ]
  workflow_dispatch: # 允许手动点一下运行

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Build Win32
        run: |
          msbuild vc\vc14_fceux.vcxproj /p:Configuration=Release /p:Platform=Win32
        shell: cmd

      - name: Build x64
        run: |
          msbuild vc\vc14_fceux.vcxproj /p:Configuration=Release /p:Platform=x64
        shell: cmd

      - name: Package Win32
        run: |
          cd output
          ..\vc\zip -X -9 -r ..\vc\fceux-win32.zip fceux.exe fceux.chm taseditor.chm lua5.1.dll lua51.dll 7z.dll auxlib.lua palettes luaScripts tools
        shell: cmd

      - name: Package x64
        run: |
          cd output
          ..\vc\zip -X -9 -j ..\vc\fceux-win64.zip ..\vc\x64\Release\fceux64.exe ..\src\drivers\win\lua\x64\lua5.1.dll ..\src\drivers\win\lua\x64\lua51.dll ..\src\auxlib.lua ..\src\drivers\win\7z_64.dll
          ..\vc\zip -X -9 -u -r ..\vc\fceux-win64.zip fceux.chm taseditor.chm palettes luaScripts tools
        shell: cmd

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: fceux-windows
          path: |
            vc\fceux-win32.zip
            vc\fceux-win64.zip